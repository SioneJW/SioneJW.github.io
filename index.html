<html>
  <head>
    <link rel="icon" type="image/x-icon" src="Images/icon.png">
    <style>
    * {
      box-sizing: border-box;
    }
    
    .column {
      float: left;
      width: 50%;
      padding:10px;
    }

    .mini_column {
      float: left;
      width: 20%;
      padding:5px;
    }
    
    /* Clearfix (clear floats) */
    .row::after {
      content: "";
      clear: both;
      display: table;
    }
    </style>
  </head>
<body style="background:linear-gradient(to bottom, #ccffff 0%, #ffffff 100%);">


<center>
<h1 style="font-family:'Brush Script MT',cursive; font-size:80px; color:rgb(0, 0, 0);"><i>Sione's Art</i></h1>
  <p style="font-family:Copperplate, Papyrus, fantasy; font-size:30px; margin-top:5cm;">Kerstkaartjes</p>
  <div class="row">
    <div class="mini_column">
      <img src="Images/kerstbal.jpeg" alt="Kerstbal" style="width:100%">
    </div>
    <div class="mini_column">
      <img src="Images/mini_skaters.jpeg" alt="Mini Skaters" style="width:100%">
    </div>
    <div class="mini_column">
      <img src="Images/lake.jpeg" alt="Lake" style="width:110%">
    </div>
    <div class="mini_column">
      img{
       padding: 2px;
      }
      <img src="Images/birds.jpeg" alt="Birds" style="width:85%">
    </div>
    <div class="mini_column">
      <img src="Images/house.jpeg" alt="House" style="width:85%">
    </div>
  </div>
</center>
<center>
  <p style="font-family:Copperplate, Papyrus, fantasy; font-size:30px; margin-top:5cm;">Drawings</p>
<div class="row">
  <div class="column">
    <img src="Images/Path.png" alt="Path" style="width:100%">
  </div>
  <div class="column">
    <img src="Images/Square.png" alt="Square" style="width:100%">
  </div>
</div>
  <p style="font-family:Copperplate, Papyrus, fantasy; font-size:30px; margin-top:5cm;">Paintings</p>
<div class="row">
  <div class="column">
    <img src="Images/deer.JPG" alt="Deer" style="width:90%">
  </div>
  <div class="column">
    <img src="Images/skaters.JPG" alt="Skaters" style="width:100%">
  </div>
</div>
</center>

  

</body>
</html>
